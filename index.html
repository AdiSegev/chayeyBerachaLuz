<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יצירת לוח זמנים - חיי ברכה</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;700&display=swap" rel="stylesheet"> -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body dir="rtl" class="container" onload="initializePage()">

    <header class="text-center mt-4 mb-4">
        <h1 class="display-5 text-primary">חיי ברכה - לוח זמנים</h1>
    </header>

    <!-- Bootstrap Tabs -->
    <ul class="nav nav-tabs mb-3" id="mainTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="holidays-tab" data-bs-toggle="tab" data-bs-target="#holidays-panel" type="button" role="tab">זמני חגים</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="shabbat-tab" data-bs-toggle="tab" data-bs-target="#shabbat-panel" type="button" role="tab">זמני שבת עונתיים</button>
        </li>
    </ul>

    <div class="tab-content">

    <!-- TAB 1: חגים -->
    <div class="tab-pane fade show active" id="holidays-panel" role="tabpanel">
    <div class="card shadow-lg">
        <div class="card-body">
            <form id="prayer-times-form" class="mt-3">
                <div class="mb-4">
                    <label for="hebrew-year" class="form-label fw-bold">בחר שנה עברית:</label>
                    <div class="position-relative">
                        <input type="text" id="hebrew-year" class="form-control" placeholder="הקלד או בחר שנה עברית..." autocomplete="off">
                        <div id="hebrew-years-dropdown" class="dropdown-menu w-100" style="max-height: 200px; overflow-y: auto; display: none;">
                            <!-- השנים יוטענו אוטומטית דרך JavaScript -->
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="holiday" class="form-label fw-bold">בחר חג:</label>
                    <select id="holiday" name="holiday" class="form-select">
                        <option value="rosh_hashana">ראש השנה</option>
                        <option value="yom_kippur">יום כיפור</option>
                        <option value="sukkot">סוכות</option>
						<option value="shabat_chol_hamoed_sukkot">שבת חול המועד סוכות</option>
                        <option value="simchat_torah">שמחת תורה</option>
                        <option value="pesach">פסח</option>
						<option value="shabat_chol_hamoed_pesach">שבת חול המועד פסח</option>
                        <option value="shvii_pesach">שביעי של פסח</option>
                        <option value="shavuot">שבועות</option>
                        <option value="tisha_beav">תשעה באב</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="day-of-week" class="form-label fw-bold">בחר יום בשבוע:</label>
                    <select id="day-of-week" name="day-of-week" class="form-select">
                        <option value="sunday">ראשון</option>
                        <option value="monday">שני</option>
                        <option value="tuesday">שלישי</option>
                        <option value="wednesday">רביעי</option>
                        <option value="thursday">חמישי</option>
                        <option value="friday">שישי</option>
                        <option value="saturday">שבת</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="sunset-time" class="form-label fw-bold">הכנס שעת שקיעה:</label>
                    <input type="time" id="sunset-time" class="form-control" required>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <button type="button" class="btn btn-primary w-100 fw-bold" onclick="generateWordDocument()">צור מסמך Word</button>
                    </div>
                    <div class="col">
                        <button type="button" class="btn btn-success w-100 fw-bold" onclick="openEditModal()">עריכה ויצירת תמונה</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    </div> <!-- /holidays-panel -->

    <!-- TAB 2: זמני שבת עונתיים -->
    <div class="tab-pane fade" id="shabbat-panel" role="tabpanel">
    <div class="card shadow-lg">
        <div class="card-body">
            <div class="mb-4">
                <label for="shabbat-season" class="form-label fw-bold">בחר עונה:</label>
                <select id="shabbat-season" class="form-select">
                    <option value="winter">חורף (סוכות עד פסח)</option>
                    <option value="summer">קיץ (פסח עד סוכות)</option>
                </select>
            </div>
            <p class="text-muted small">השנה העברית נלקחת מהשדה הראשי למעלה. יש לבחור שנה תחילה.</p>

            <!-- כפתור הגדרות -->
            <div class="mb-2 text-end">
                <button class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#shabbat-settings" aria-expanded="false">
                    ⚙ הגדרות חישוב
                </button>
            </div>

            <!-- פאנל הגדרות -->
            <div class="collapse mb-3" id="shabbat-settings" dir="rtl">
                <div class="card card-body bg-light border p-3">
                    <div class="row g-3">
                        <!-- עמודה 1: מנחה ערב שבת -->
                        <div class="col-md-6">
                            <h6 class="fw-bold border-bottom pb-1 mb-2">מנחה ערב שבת</h6>
                            <div class="mb-2">
                                <label class="form-label small mb-1">דקות לפני שקיעה</label>
                                <input type="number" id="setting-mincha-offset" class="form-control form-control-sm" value="20" min="1" max="60">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">עיגול בשעון קיץ</label>
                                <select id="setting-mincha-round-summer" class="form-select form-select-sm">
                                    <option value="floor" selected>למטה תמיד (floor)</option>
                                    <option value="nearest">לקרוב ביותר (nearest)</option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">עיגול בשעון חורף</label>
                                <select id="setting-mincha-round-winter" class="form-select form-select-sm">
                                    <option value="nearest" selected>לקרוב ביותר (nearest)</option>
                                    <option value="floor">למטה תמיד (floor)</option>
                                </select>
                            </div>
                        </div>
                        <!-- עמודה 2: ערבית מוצ"ש -->
                        <div class="col-md-6">
                            <h6 class="fw-bold border-bottom pb-1 mb-2">ערבית מוצ"ש</h6>
                            <div class="mb-2">
                                <label class="form-label small mb-1">דקות אחרי שקיעה (שעון קיץ)</label>
                                <input type="number" id="setting-arvit-offset-summer" class="form-control form-control-sm" value="35" min="1" max="120">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">דקות אחרי שקיעה (שעון חורף)</label>
                                <input type="number" id="setting-arvit-offset-winter" class="form-control form-control-sm" value="40" min="1" max="120">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">תקרה מקסימלית (שעון קיץ)</label>
                                <input type="time" id="setting-arvit-cap" class="form-control form-control-sm" value="20:15">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">מינימום דקות מהשקיעה (לפני תקרה)</label>
                                <input type="number" id="setting-arvit-min-gap" class="form-control form-control-sm" value="30" min="1" max="60">
                            </div>
                        </div>
                        <!-- שורה 2: זמנים קבועים + שיר/מת'אמנה -->
                        <div class="col-md-6">
                            <h6 class="fw-bold border-bottom pb-1 mb-2">מנחה שבת (זמן קבוע)</h6>
                            <div class="mb-2">
                                <label class="form-label small mb-1">קיץ</label>
                                <input type="time" id="setting-mincha-shabbat-summer" class="form-control form-control-sm" value="17:00">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">חורף</label>
                                <input type="time" id="setting-mincha-shabbat-winter" class="form-control form-control-sm" value="12:45">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h6 class="fw-bold border-bottom pb-1 mb-2">שיר השירים ומת'אמנה</h6>
                            <div class="mb-2">
                                <label class="form-label small mb-1">שיר השירים — דקות לפני מנחה</label>
                                <input type="number" id="setting-shir-offset" class="form-control form-control-sm" value="25" min="1" max="60">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1">מת'אמנה — דקות לפני ערבית</label>
                                <input type="number" id="setting-tamhana-offset" class="form-control form-control-sm" value="25" min="1" max="60">
                            </div>
                        </div>
                    </div>
                    <div class="text-start mt-2">
                        <button class="btn btn-sm btn-outline-danger" onclick="resetShabbatSettings()">↺ אפס לברירת מחדל</button>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <button type="button" class="btn btn-primary w-100 fw-bold" onclick="calculateShabbatSchedule()">חשב לוח שבתות</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-success w-100 fw-bold" onclick="generateShabbatScheduleDocument()">ייצא ל-Word</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-info w-100 fw-bold text-white" onclick="generateShabbatScheduleImage()">ייצא תמונה</button>
                </div>
            </div>
            <div id="shabbat-schedule-container" class="mt-4"></div>
        </div>
    </div>
    </div> <!-- /shabbat-panel -->

    </div> <!-- /tab-content -->

    <!-- Modal עריכת זמני תפילה -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute" style="left: 15px; top: 50%; transform: translateY(-50%);" data-bs-dismiss="modal" aria-label="Close"></button>
                    <h5 class="modal-title w-100 text-center" id="editModalLabel">
                        <i class="fas me-2"></i>עריכת זמני תפילה
                    </h5>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-4">
                        <div class="col-lg-6">
                            <div class="card h-100">
                                <div class="card-header bg-light">
                                    <h6 class="card-title mb-0 text-primary">
                                        <i class="fas me-2"></i>עריכת זמנים
                                    </h6>
                                </div>
                                <div class="card-body">
                                    <div id="editTable"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="card h-100">
                                <div class="card-header bg-light">
                                    <h6 class="card-title mb-0 text-success">
                                        <i class="fas me-2"></i>תצוגה מקדימה
                                    </h6>
                                </div>
                                <div class="card-body">
                                    <div id="previewContainer" style="height: auto; min-height: 400px; overflow: visible;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        <i class="fas me-2"></i>ביטול
                    </button>
                    <button type="button" class="btn btn-primary" onclick="generateWordFromEdited()" data-bs-dismiss="modal">
                        <i class="fas fa-file-word me-2"></i>ייצא ל-Word
                    </button>
                    <button type="button" class="btn btn-success" onclick="generateFinalImageFromEdited()" data-bs-dismiss="modal">
                        <i class="fas fa-image me-2"></i>צור תמונה
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Modal -->
    <div class="modal fade" id="loadingModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-body text-center p-5">
                    <div class="loading-spinner mb-4">
                        <div class="spinner-border text-primary" style="width: 4rem; height: 4rem;" role="status">
                            <span class="visually-hidden">טוען...</span>
                        </div>
                    </div>
                    <h5 class="text-primary mb-3">טוען זמני תפילה</h5>
                    <p class="text-muted mb-0">משיכת נתונים מ-Hebcal...</p>
                    <div class="progress mt-3" style="height: 8px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5">
        <p class="text-muted">&copy; 2024 - אפליקציית לוח זמנים לחגים יהודים</p>
    </footer>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
	<script src="https://unpkg.com/kosher-zmanim@0.8.2/dist/kosher-zmanim.min.js"></script>
    <script src="script.js"></script>
    <script src="edit_functions.js"></script>
	<script src="rosh_hashana.js"></script>
	<script src="yom_kippur.js"></script>
	<script src="sukkot.js"></script>
	<script src="shabat_chol_hamoed_sukkot.js"></script>
	<script src="simchat_torah.js"></script>
	<script src="pesach.js"></script>
	<script src="shvii_pesach.js"></script>
	<script src="shabat_chol_hamoed_pesach.js"></script>
	<script src="shavuot.js"></script>
    <script src="tisha_beav.js"></script>
    <script src="zmanim_5786.js"></script>
    <script src="shabbat_schedule.js"></script>
    </body>
</html>
